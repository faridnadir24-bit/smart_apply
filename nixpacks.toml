[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo", "php83Extensions.pdo_sqlite", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.curl", "php83Extensions.zip", "nodejs_20", "npm-9_x"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm ci",
  "npm run build"
]

[phases.build]
cmds = [
  "php artisan config:clear",
  "php artisan route:clear",
  "php artisan view:clear"
]

[start]
cmd = "mkdir -p database && touch database/database.sqlite && php artisan migrate --force && php artisan db:seed --class=RoleAndUserSeeder --force && php artisan db:seed --class=JobListingSeeder --force && php artisan storage:link --force && php artisan serve --host=0.0.0.0 --port=$PORT"